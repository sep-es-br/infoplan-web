<ngx-flip-table [cardTitle]="title" [tableContent]="flipTableContent" [tableOnFront]="true" [showSearchField]="true"
  [backCardHeight]="isChartMaximized('total-entregas-por-orgao-execucao') ? calcMaximizedHeight() : 400"
  [showMaximizeButton]="true" [loadingStatus]="requestStatus" (executeSearch)="handleUserTableSearch($event)"
  (executeDownload)="handleUserTableDownload()"
  (showMaximizeButtonClick)="onMaximizeButtonClick('total-entregas-por-orgao-execucao', $event)" card-front>
  <ngx-org-chart-horizontal [chart]="chartData" [chartDataConfig]="chartDataConfig" [showMaximizeButton]="true"
    (maximizeButtonClick)="onMaximizeButtonClick('total-entregas-por-orgao-execucao', $event)" card-back>
  </ngx-org-chart-horizontal>
</ngx-flip-table>
