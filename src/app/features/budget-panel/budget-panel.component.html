<div class="col-12">
  <div class="filter-container">
    <div class="filter-wrapper" [class.is-sticky]="isScrolled">
      <div
        class="filter-button"
        [class.is-sticky]="isScrolled"
        [class.has-nav-buttons]="menuExecucao?.length > 0"
      >
        <div class="nav-buttons-container flex-grow-1">
          <ngx-sticky-tag-nav [tags]="menuExecucao"></ngx-sticky-tag-nav>
        </div>

        <div class="d-flex align-items-center gap-2 flex-grow-1">
        <div class="filter-tags ms-auto" [class.is-sticky]="isScrolled">
          <div *ngFor="let tag of activeFilters; let i = index">
            <div class="filter-tag" [class.is-sticky]="isScrolled">
              <div class="filter-tag-inner" [ngClass]="{ 'invisible-tag': showFilters }">
                <div>
                  <div class="tag-label">{{ tag.label }}</div>

                  <div class="tag-value">
                    <ng-container *ngFor="let valueDisplay of tag.displayValue; let index = index">
                      <ng-container *ngIf="valueDisplay.name?.length <= 20; else spanWithTooltip">
                        <span>
                          {{
                          (index > 0 ? " " : "") +
                          (tag.displayValue.length > 1
                          ? valueDisplay.name + ";"
                          : valueDisplay.name)
                          }}
                        </span>
                      </ng-container>

                      <ng-template #spanWithTooltip>
                        <span [nbTooltip]="
                      valueDisplay.fullName
                        ? valueDisplay.fullName
                        : valueDisplay.name
                    ">
                          {{
                          (index > 0 ? " " : "") +
                          (valueDisplay.name | TextTruncate : 17 : ";")
                          }}
                        </span>
                      </ng-template>
                    </ng-container>
                  </div>
                </div>
              </div>
              <button *ngIf="tag.key !== 'year'" class="remove-button" (click)="removeFilter(tag.key)">
                x
              </button>
            </div>
          </div>
        </div>

        <button
          class="filter-toggle-icon-only"
          [class.is-sticky]="isScrolled"
          type="button"
          data-bs-toggle="modal"
          data-bs-target="#filtrosModal"
          (click)="blurButton($event)"
          nbTooltip="Filtros">
          <nb-icon [icon]="'funnel-outline'"></nb-icon>
        </button>
        </div>
      </div>
    </div>
    <!-- Painel de Filtros Simplificado -->
    <div class="modal fade dashboard-filter-modal" id="filtrosModal" tabindex="-1" aria-labelledby="filtrosModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-body">
            <form class="w-100">
              <div class="form-header w-100 d-flex justify-content-end">
                <button class="btn p-0 close-filter-button" data-bs-dismiss="modal" #modalCloseButton
                  (click)="closeFilterModal()">
                  <nb-icon [icon]="'close-outline'"></nb-icon>
                </button>
              </div>

              <div class="d-flex flex-column w-100">
                <div class="filter-row d-flex flex-column flex-md-row flex-wrap w-100">
                  <!-- Ano -->
                  <div class="filter-entity d-flex flex-column col-12 col-md-6 col-xl-4">
                    <span class="mb-1">Ano</span>
                    <nb-select name="ano" placeholder="Selecionar" size="tiny" [(ngModel)]="filter.year"
                      (selectedChange)="handleFilterChange('year', [$event])" #customSelect>
                      <nb-option *ngFor="let ano of yearsList" [value]="ano.num" [nbTooltip]="
                          ano.num >= 2014 && ano.num <= 2022
                            ? 'Apenas despesas'
                            : null
                        " [nbTooltipTrigger]="
                          ano.num >= 2014 && ano.num <= 2022 ? 'hint' : 'noop'
                        " [nbTooltipPlacement]="right" #tooltip="nbTooltip">
                        {{ ano.num }}
                      </nb-option>
                    </nb-select>
                  </div>

                  <!-- Mês -->
                  <div class="filter-entity d-flex flex-column col-12 col-md-6 col-xl-4">
                    <span class="mb-1">Mês</span>
                    <nb-select multiple name="mes" placeholder="Selecionar" size="tiny" [(ngModel)]="filter.month"
                      (selectedChange)="handleFilterChange('month', $event)" #customSelect>
                      <nb-option *ngFor="let mes of monthsList" [value]="mes.num">
                        {{ mes.name }}
                      </nb-option>
                    </nb-select>
                  </div>

                  <!-- Tipo de Fonte -->
                  <div class="filter-entity d-flex flex-column col-12 col-md-6 col-xl-4">
                    <span class="mb-1">Tipo de Fonte</span>
                    <nb-select multiple name="tipoFonte" placeholder="Selecionar" size="tiny"
                      [(ngModel)]="filter.sourceType" (selectedChange)="
                        handleFilterChange('sourceType', $event)
                      " #customSelect>
                      <nb-option [value]="1"> 1 - Caixa do Tesouro</nb-option>
                      <nb-option [value]="2"> 2 - Demais Fontes</nb-option>
                    </nb-select>
                  </div>
                </div>
              </div>
            </form>
          </div>

          <div class="modal-footer d-flex flex-column flex-sm-row justify-content-center justify-content-sm-end">
            <button class="mx-4" nbButton size="small" status="warning" outline shape="semi-round"
              (click)="resetFilters()">
              Restaurar Filtros
            </button>
            <button nbButton size="small" status="success" hero shape="semi-round" data-bs-dismiss="modal"
              (click)="filtrar($event)">
              Filtrar
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-2 g-md-2 mb-2">
    <div class="col-12 col-xs-12 col-sm-6 col-md-6 col-lg-4 col-xl-4 col-xxl-2 px-1 ">
      <div class="card">
        <div class="card-content">
          <div class="portfolio-content">
            <img src="assets/images/app/LogoResumoExecutivo.png" alt="Logo Execução Orçamentária Resumo Orçamentário"
              class="img-fluid" />
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 col-xs-12 col-sm-6 col-md-6 col-lg-4 col-xl-4 col-xxl-2  px-1 ">
      <ngx-dashboard-summary-card
        [value]="formatNumber(totals.totalPlannedRevenue)"
        prefix="R$"
        label="Receita Prevista"
        icon="fa fa-crosshairs"
        accentColor="var(--receita-prevista)"
        [tooltip]="'R$ ' + (totals.totalPlannedRevenue | number : '1.0-0')"
        [loading]="requestStatus.totals === 'Loading'"
      ></ngx-dashboard-summary-card>
    </div>

    <div class="col-12 col-xs-12 col-sm-6 col-md-6 col-lg-4 col-xl-4 col-xxl-2 px-1 ">
      <ngx-dashboard-summary-card
        [value]="formatNumber(totals.totalRealizedRevenue)"
        prefix="R$"
        label="Receita Realizada"
        icon="fa fa-check-circle"
        accentColor="var(--receita-realizada)"
        [tooltip]="'R$ ' + (totals.totalRealizedRevenue | number : '1.0-2')"
        [loading]="requestStatus.totals === 'Loading'"
      ></ngx-dashboard-summary-card>
    </div>

    <div class="col-xs-12 col-sm-6 col-md-6 col-lg-4 col-xl-4 col-xxl-2 px-1 ">
      <ngx-dashboard-summary-card
        [value]="totals.realizedVsPlannedRevenuePercentage + ' %'"
        label="Receita Realizada/ Prevista"
        icon="assets/images/app/icone-receita-realizada-prevista.png"
        accentColor="var(--receita-realizada-prevista)"
        [loading]="requestStatus.totals === 'Loading'"
      ></ngx-dashboard-summary-card>
    </div>

    <div class="col-xs-12 col-sm-6 col-md-6 col-lg-4 col-xl-4 col-xxl-2 px-1 ">
      <ngx-dashboard-summary-card
        [value]="totals.committedVsAuthorizedExpensePercentage + ' %'"
        label="Despesa Empenhada/ Autorizada"
        icon="fa fa-handshake"
        accentColor="var(--despesa-empenhada-autorizada)"
        [loading]="requestStatus.totals === 'Loading'"
      ></ngx-dashboard-summary-card>
    </div>

    <div class="col-xs-12 col-sm-6 col-md-6 col-lg-4 col-xl-4 col-xxl-2  px-1">
      <ngx-dashboard-summary-card
        [value]="totals.liquidatedVsAuthorizedExpensePercentage + ' %'"
        label="Despesa Liquidada/ Autorizada"
        icon="fas fa-hand-holding-usd"
        accentColor="var(--despesa-liquida-autorizada)"
        [loading]="requestStatus.totals === 'Loading'"
      ></ngx-dashboard-summary-card>
    </div>
  </div>
  <div class="dashboard-graphs-container position-relative">
    <div class="dashboard-graphs-container position-relative">
      <div class="row g-1 g-md-1">
        <ng-container *ngIf="!isVisiblePanelExpense">
          <!-- Receita Total -->
          <div class="chart-container" [class.maximized]="isChartMaximized('revenue-total')"
            [class.col-12]="!isChartMaximized('revenue-total')" [class.col-md-12]="!isChartMaximized('revenue-total')"
            [class.col-lg-6]="!isChartMaximized('revenue-total')" [class.col-xl-6]="!isChartMaximized('revenue-total')"
            [class.col-xxl-6]="!isChartMaximized('revenue-total')"
            [class.col-xxxl-4]="!isChartMaximized('revenue-total')">
            <ngx-revenue-total class="w-100" (dataRevenueTotalCards)="(dataCards)" [filter]="currentRequestParams">
            </ngx-revenue-total>
          </div>

          <!-- Receita Categoria -->
          <div class="chart-container" [class.maximized]="isChartMaximized('revenue-category')"
            [class.col-12]="!isChartMaximized('revenue-category')"
            [class.col-md-12]="!isChartMaximized('revenue-category')"
            [class.col-lg-6]="!isChartMaximized('revenue-category')"
            [class.col-xl-6]="!isChartMaximized('revenue-category')"
            [class.col-xxl-6]="!isChartMaximized('revenue-category')"
            [class.col-xxxl-4]="!isChartMaximized('revenue-category')">
            <ngx-revenue-category class="w-100" [filter]="currentRequestParams" (sendMaximizeButtonClick)="
                handleMaximizeButtonClick('revenue-category', $event)
              ">
            </ngx-revenue-category>
          </div>

          <div class="chart-container" [class.maximized]="isChartMaximized('revenue-origin')"
            [class.col-12]="!isChartMaximized('revenue-origin')" [class.col-md-12]="!isChartMaximized('revenue-origin')"
            [class.col-lg-6]="!isChartMaximized('revenue-origin')"
            [class.col-xl-6]="!isChartMaximized('revenue-origin')"
            [class.col-xxl-6]="!isChartMaximized('revenue-origin')"
            [class.col-xxxl-4]="!isChartMaximized('revenue-origin')">
            <ngx-revenue-origin class="w-100" [filter]="currentRequestParams" (sendMaximizeButtonClick)="
                handleMaximizeButtonClick('revenue-origin', $event)
              ">
            </ngx-revenue-origin>
          </div>

          <!-- Receita Impostos -->
          <div class="chart-container" [class.maximized]="isChartMaximized('revenue-taxes')"
            [class.col-12]="!isChartMaximized('revenue-taxes')" [class.col-md-12]="!isChartMaximized('revenue-taxes')"
            [class.col-lg-6]="!isChartMaximized('revenue-taxes')" [class.col-xl-6]="!isChartMaximized('revenue-taxes')"
            [class.col-xxl-6]="!isChartMaximized('revenue-taxes')"
            [class.col-xxxl-4]="!isChartMaximized('revenue-taxes')">
            <ngx-revenue-taxes class="w-100" [filter]="currentRequestParams" (sendMaximizeButtonClick)="
                handleMaximizeButtonClick('revenue-taxes', $event)
              ">
            </ngx-revenue-taxes>
          </div>

          <!-- Receita Participação -->
          <div class="chart-container" [class.maximized]="isChartMaximized('revenue-participation')"
            [class.col-12]="!isChartMaximized('revenue-participation')"
            [class.col-md-12]="!isChartMaximized('revenue-participation')"
            [class.col-lg-6]="!isChartMaximized('revenue-participation')"
            [class.col-xl-6]="!isChartMaximized('revenue-participation')"
            [class.col-xxl-6]="!isChartMaximized('revenue-participation')"
            [class.col-xxxl-4]="!isChartMaximized('revenue-participation')">
            <ngx-revenue-participation class="w-100" [filter]="currentRequestParams" (sendMaximizeButtonClick)="
                handleMaximizeButtonClick('revenue-participation', $event)
              ">
            </ngx-revenue-participation>
          </div>

          <!-- Receita ICMS -->
          <div class="chart-container" [class.maximized]="isChartMaximized('revenue-icms')"
            [class.col-12]="!isChartMaximized('revenue-icms')" [class.col-md-12]="!isChartMaximized('revenue-icms')"
            [class.col-lg-6]="!isChartMaximized('revenue-icms')" [class.col-xl-6]="!isChartMaximized('revenue-icms')"
            [class.col-xxl-6]="!isChartMaximized('revenue-icms')"
            [class.col-xxxl-4]="!isChartMaximized('revenue-icms')">
            <ngx-revenue-icms class="w-100" [filter]="currentRequestParams" (sendMaximizeButtonClick)="
                handleMaximizeButtonClick('revenue-icms', $event)
              ">
            </ngx-revenue-icms>
          </div>

          <!-- Receita Transferência -->
          <div class="chart-container" [class.maximized]="isChartMaximized('revenue-transfer')"
            [class.col-12]="!isChartMaximized('revenue-transfer')"
            [class.col-md-12]="!isChartMaximized('revenue-transfer')"
            [class.col-lg-6]="!isChartMaximized('revenue-transfer')"
            [class.col-xl-6]="!isChartMaximized('revenue-transfer')"
            [class.col-xxl-6]="!isChartMaximized('revenue-transfer')"
            [class.col-xxxl-6]="!isChartMaximized('revenue-transfer')">
            <ngx-revenue-transfer class="w-100" [filter]="currentRequestParams" (sendMaximizeButtonClick)="
                handleMaximizeButtonClick('revenue-transfer', $event)
              ">
            </ngx-revenue-transfer>
          </div>
        </ng-container>

        <!-- Receita Despesa GND Total -->
        <div class="chart-container" [class.maximized]="isChartMaximized('revenue-expense-gnd-total')"
          [class.col-12]="!isChartMaximized('revenue-expense-gnd-total')"
          [class.col-md-12]="!isChartMaximized('revenue-expense-gnd-total')" [class.col-lg-6]="
            !isChartMaximized('revenue-expense-gnd-total') &&
            !isVisiblePanelExpense
          " [class.col-xl-6]="
            !isChartMaximized('revenue-expense-gnd-total') &&
            !isVisiblePanelExpense
          " [class.col-xxl-6]="
            !isChartMaximized('revenue-expense-gnd-total') &&
            !isVisiblePanelExpense
          " [class.col-xxxl-6]="
            !isChartMaximized('revenue-expense-gnd-total') &&
            !isVisiblePanelExpense
          ">
          <ngx-revenue-expense-gnd-total class="w-100" (RevenueExpenseGndTotalOrcamento)="(dataCards)"
            [filter]="currentRequestParams" (sendMaximizeButtonClick)="
              handleMaximizeButtonClick('revenue-expense-gnd-total', $event)
            ">
          </ngx-revenue-expense-gnd-total>
        </div>

        <!-- Receita Despesa GND -->
        <div class="chart-container" [class.maximized]="isChartMaximized('revenue-expense-gnd')"
          [class.col-12]="!isChartMaximized('revenue-expense-gnd')"
          [class.col-md-12]="!isChartMaximized('revenue-expense-gnd')"
          [class.col-lg-12]="!isChartMaximized('revenue-expense-gnd')"
          [class.col-xl-12]="!isChartMaximized('revenue-expense-gnd')"
          [class.col-xxl-12]="!isChartMaximized('revenue-expense-gnd')"
          [class.col-xxxl-12]="!isChartMaximized('revenue-expense-gnd')">
          <ngx-revenue-expense-gnd class="w-100" [filter]="currentRequestParams" (sendMaximizeButtonClick)="
              handleMaximizeButtonClick('revenue-expense-gnd', $event)
            ">
          </ngx-revenue-expense-gnd>
        </div>
      </div>
    </div>
    <div class="d-flex flex-wrap col-12 col-xxl-6 p-0">
      <div class="col-12 col-md-6 px-x1 mb-1 align-self-start"></div>
    </div>
  </div>

  <nb-layout-footer class="dashboard-footer-wrapper px-1">
    <ngx-footer [timestamp]="timestamp"></ngx-footer>
  </nb-layout-footer>
</div>
