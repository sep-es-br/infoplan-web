<div
  class="pie-chart-container"
  [style.height]="height"
  [style.width]="width"
>
  <div
    *ngIf="!data || data.length === 0"
    class="no-data-message"
  >
    Nenhum dado disponível
  </div>

  <div
    echarts
    [options]="chartOptions"
    (chartInit)="onChartInit($event)"
    [style.height]="chartHeight"
    class="chart"
    *ngIf="data && data.length > 0"
  ></div>
</div>
