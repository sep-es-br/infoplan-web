<ngx-flip-table
  [cardTitle]="title"
  [showSearchField]="true"
  [tableOnFront]="true"
  [tableContent]="flipTableContent"
  [showMaximizeButton]="true"
  [loadingStatus]="requestStatus"
  (executeDownload)="handleTableDownload()"
  (executeSearch)="handleUserTableSearch($event)"
  [backCardHeight]="isChartMaximized('quantidade-maior-entrega') ? calcMaximizedHeight() : 308"
  (showMaximizeButtonClick)="onMaximizeButtonClick('quantidade-maior-entrega', $event)" card-front>

</ngx-flip-table>
