<ngx-flip-table [cardTitle]="'Riscos por Importância'" [showSearchField]="true" [tableContent]="flipTableContent" [loadingStatus]="requestStatus"
  [showMaximizeButton]="true" [outerCardHeight]="isChartMaximized('risks-by-classification') ? (calcMaximizedHeight() + 125) : 275"
  [backCardHeight]="isChartMaximized('risks-by-classification') ? calcMaximizedHeight() : 150"
  (executeSearch)="handleUserTableSearch($event)" (executeDownload)="handleUserTableDownload()"
  (showMaximizeButtonClick)="onMaximizeButtonClick('risks-by-classification', $event)">
  <ngx-pie-chart-model [data]="chartData" [colors]="chartColors"
    [height]="isChartMaximized('risks-by-classification') ? calcMaximizedHeight() : 150"
    [isMaximized]="isChartMaximized('risks-by-classification')" card-front>
  </ngx-pie-chart-model>
</ngx-flip-table>
