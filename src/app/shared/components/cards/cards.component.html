<div
  class="dashboard-summary-card"
  [ngClass]="'dashboard-summary-card--' + variant"
  [style.--summary-card-accent]="accentColor"
  [nbTooltip]="tooltip || null"
  [nbTooltipClass]="tooltipClass"
  nbTooltipPlacement="bottom"
>
  <div class="dashboard-summary-card__icon" *ngIf="!loading && icon">
    <span *ngIf="iconText; else iconAsset" [class]="icon">{{ iconText }}</span>
    <ng-template #iconAsset>
    <img *ngIf="isImage(icon); else fontIcon" [src]="icon" [alt]="label" />
    <ng-template #fontIcon>
      <i [class]="icon" aria-hidden="true"></i>
    </ng-template>
    </ng-template>
  </div>

  <div class="dashboard-summary-card__content">
    <div
      *ngIf="loading; else cardContent"
      class="dashboard-summary-card__loading"
      role="status"
      aria-live="polite"
    >
      <span class="spinner-border" aria-hidden="true"></span>
      <span class="visually-hidden">Carregando...</span>
    </div>

    <ng-template #cardContent>
      <div class="dashboard-summary-card__value-box">
        <div class="dashboard-summary-card__value-content">
          <span *ngIf="prefix" class="dashboard-summary-card__prefix">{{ prefix }}</span>
          <span class="dashboard-summary-card__value">{{ value }}</span>
        </div>
      </div>

      <div class="dashboard-summary-card__text">
        <div class="dashboard-summary-card__label">{{ label }}</div>
        <div
          *ngIf="subtitle"
          class="dashboard-summary-card__subtitle"
          [nbTooltip]="subtitleTooltip || null"
          nbTooltipPlacement="bottom"
        >{{ subtitle }}</div>
      </div>
    </ng-template>
  </div>
</div>
