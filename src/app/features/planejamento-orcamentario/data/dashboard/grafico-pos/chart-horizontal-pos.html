<ngx-flip-table [showSearchField]="true" [cardTitle]="title" [loadingStatus]="loadingStatus"
  [tableContent]="tableContent" (executeDownload)="handleTableDownload()"
  [backCardHeight]="isChartMaximized('revenue-taxes') ? calcMaximizedHeight() : 500" [showMaximizeButton]="true"
  (showMaximizeButtonClick)="onMaximizeButtonClick('revenue-taxes',$event)">
  <ngx-org-chart-horizontal [chart]="chartData"
    [height]="isChartMaximized('revenue-taxes') ? calcMaximizedHeight() : 300" card-front>
  </ngx-org-chart-horizontal>
</ngx-flip-table>
