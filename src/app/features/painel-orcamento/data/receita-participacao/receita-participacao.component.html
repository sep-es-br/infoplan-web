<ngx-flip-table [cardTitle]="title" [loadingStatus]="requestStatus" [tableContent]="tableContent" backCardHeight="308"
  [showTableIcon]="showTableIcon" [showSearchField]="true" (executeDownload)="handleTableDownload()"
  [showMaximizeButton]="true" (showMaximizeButtonClick)="onMaximizeButtonClick('receita-participacao', $event)">
  <ngx-pie-chart [data]="chartData" [colors]="['#F58B9B', '#4DB6D2']"
    [height]="isChartMaximized('receita-participacao') ? calcMaximizedHeight() : '300'" [config]="chartConfig"
    card-front>
  </ngx-pie-chart>
</ngx-flip-table>
