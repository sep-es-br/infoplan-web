<ngx-flip-table [showSearchField]="false" [cardTitle]="title" [tableContent]="tableContent"
  [loadingStatus]="requestStatus" (executeDownload)="handleTableDownload()" showMaximizeButton="true"
  [backCardHeight]="isChartMaximized('revenue-origin') ? calcMaximizedHeight() : 308"
  (showMaximizeButtonClick)="onMaximizeButtonClick('revenue-origin', $event)">
  <ngx-org-chart-horizontal [chart]="chartData" [valueType]="'currency'"
    [height]="isChartMaximized('revenue-origin') ? calcMaximizedHeight() : 300" [chartDataConfig]="chartDataConfig"
    [showMaximizeButton]="isChartMaximized('revenue-origin')" card-front>
  </ngx-org-chart-horizontal>
</ngx-flip-table>
