<nb-card class="card-dinamico h-100" [class]="'card-' + cor">
  <nb-card-body class="card-dinamico-body d-flex flex-column align-items-center justify-content-center h-100 p-2 p-md-3">
    <div class="card-content w-100 text-center">
      <div class="card-value mb-1 mb-md-2">
        {{ value }}
      </div>
      <div class="card-description">
        {{ description }}
      </div>
    </div>
  </nb-card-body>
</nb-card>
