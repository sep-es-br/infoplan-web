  <div class="col-12 col-md-6 col-xl-12">
      <nb-card class="cards-exec">
    <nb-card-body>
      <div class="row g-3">
        <div class="col-2">
          <img
            src="assets/images/app/logo-exec-orc-claro.png"
            alt=""
            style="width: 100%;"
          />
        </div>

        <div *ngFor="let card of cards" class="col-2">
          <ngx-cards-component
            [value]="card.value"
            [description]="card.description"
            [cor]="card.cor"
            [icone]="card.icone"
            class="w-100"
          >
          </ngx-cards-component>
        </div>
      </div>
    </nb-card-body>
  </nb-card>
  </div>
  <div class="chart-container row g-2">
    <div class="chart-receita-prevista col-12 col-md-6 px-1 col-xl-4">
      <ngx-receita-total [filter]="currentRequestParams"></ngx-receita-total>
    </div>

    <div class="chart-receita col-12 col-md-6 px-1 col-xl-4">
      <ngx-receita-categoria
        [filter]="currentRequestParams"
      ></ngx-receita-categoria>
    </div>

    <div class="chart-receita col-12 col-md-6 px-1 col-xl-4">
      <ngx-receita-origem [filter]="currentRequestParams"></ngx-receita-origem>
    </div>

    <div class="chart-receita col-12 col-md-6 px-1 col-xl-4">
      <ngx-receita-impostos
        [filter]="currentRequestParams"
      ></ngx-receita-impostos>
    </div>

    <div class="chart-receita col-12 col-md-6 px-1 col-xl-4">
      <ngx-receita-participacao
        [filter]="currentRequestParams"
      ></ngx-receita-participacao>
    </div>

    <div class="chart-receita col-12 col-md-6 px-1 col-xl-4">
      <ngx-receita-icms [filter]="currentRequestParams"></ngx-receita-icms>
    </div>

    <div class="chart-receita col-12 col-md-6 px-1 col-xl-4">
      <ngx-receita-transferencia
        [filter]="currentRequestParams"
      ></ngx-receita-transferencia>
    </div>

    <div class="chart-receita col-12 col-md-6 px-1 col-xl-4">
      <ngx-receita-despesa-gnd-total [filter]="currentRequestParams"></ngx-receita-despesa-gnd-total>
    </div>

    <div class="chart-receita col-12 col-md-6 px-1 col-xl-4">
      <ngx-receita-despesa-gnd
        [filter]="currentRequestParams"
      ></ngx-receita-despesa-gnd>
    </div>
  </div>

  <div class="d-flex flex-wrap col-12 col-xxl-6 p-0">
    <div class="col-12 col-md-6 px-x1 mb-1 align-self-start"></div>
  </div>
</div>
