<ngx-flip-table [showSearchField]="false" [cardTitle]="title" [tableContent]="tableContent"
    [loadingStatus]="requestStatus" (executeDownload)="handleTableDownload()" [backCardHeight]="400"
    [showMaximizeButton]="true" (showMaximizeButtonClick)="onMaximizeButtonClick('success-of-planned', $event)">

    <div card-front>
        <div class="chart-controls d-flex flex-wrap gap-3 mb-2 px-2 pb-2 border-bottom">
            <div class="control-item d-flex align-items-center gap-3">
                <span class="grouping-label">Agrupar por:</span>
                <nb-toggle [checked]="groupingMode === 'YEAR_GND'" (checkedChange)="onGroupingModeChange('YEAR_GND')" status="primary">
                    Ano
                </nb-toggle>
                <nb-toggle [checked]="groupingMode === 'GND'" (checkedChange)="onGroupingModeChange('GND')" status="primary">
                    GND
                </nb-toggle>
            </div>
        </div>

        <ngx-org-chart-opposite [chart]="chartData"
            [height]="isChartMaximized('success-of-planned') ? calcMaximizedHeight() : 500"
            [groupingMode]="groupingMode" [isMaximized]="isChartMaximized('success-of-planned')">
        </ngx-org-chart-opposite>
    </div>

</ngx-flip-table>
