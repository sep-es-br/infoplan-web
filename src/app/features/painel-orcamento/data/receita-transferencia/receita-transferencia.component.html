<ngx-flip-table
  [cardTitle]="title"
  [tableContent]="tableContent"
  [loadingStatus]="loadingStatus"
  (executeSearch)="handleTableSearch($event)"
  (executeDownload)="handleTableDownload()"
>
  <ngx-org-chart-horizontal
    [chart]="chartData"
    [height]="300"
    card-front
  ></ngx-org-chart-horizontal>
</ngx-flip-table>
