<ngx-flip-table [cardTitle]="'Marcos Críticos por Desempenho'" [showSearchField]="true" [tableContent]="flipTableContent"
  [loadingStatus]="requestStatus" [outerCardHeight]="isChartMaximized('critical-milestones-for-performance') ? (calcMaximizedHeight() + 125) : 275"
  [backCardHeight]="isChartMaximized('critical-milestones-for-performance') ? calcMaximizedHeight() : 150" [showMaximizeButton]="true"
  (executeSearch)="handleUserTableSearch($event)" (executeDownload)="handleUserTableDownload()"
  (showMaximizeButtonClick)="onMaximizeButtonClick('critical-milestones-for-performance', $event)">
  <ngx-pie-chart-model [data]="chartData" [colors]="chartColors"
    [height]="isChartMaximized('critical-milestones-for-performance') ? calcMaximizedHeight() : 150"
    [isMaximized]="isChartMaximized('critical-milestones-for-performance')" card-front>
  </ngx-pie-chart-model>
</ngx-flip-table>
