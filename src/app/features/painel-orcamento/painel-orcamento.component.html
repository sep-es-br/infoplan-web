<div class="container">
  <div class="filter-container">
    <div class="filter-button px-2">
      <div class="filter-tags">
        <div *ngFor="let tag of activeFilters; let i = index">
          <div class="filter-tag" [ngClass]="{ 'invisible-tag': showFilters }">
            <div>
              <div class="tag-label">
                {{ tag.label }}:
              </div>

              <div class="tag-value">
                <ng-container *ngFor="let value of tag.displayValue; let index = index">
                  <ng-container *ngIf="value.name?.length <= 20 else spanWithTooltip">
                    <span>
                      {{ (index > 0 ? ' ' : '') + (tag.displayValue.length > 1 ? (value.name + ';') : value.name) }}
                    </span>
                  </ng-container>

                  <ng-template #spanWithTooltip>
                    <span [nbTooltip]="value.fullName ? value.fullName : value.name">
                      {{ (index > 0 ? ' ' : '') + (value.name | TextTruncate : 17 : ';') }}
                    </span>
                  </ng-template>
                </ng-container>
              </div>
            </div>
            <button *ngIf="tag.key !== 'ano'" class="remove-button" (click)="removeFilter(tag.key)">
              x
            </button>
          </div>
        </div>
      </div>

      <div class="filter-button">
        <button class="filter-toggle p-0" type="button" data-bs-toggle="modal" data-bs-target="#filtrosModal">
          Filtros
          <nb-icon [icon]="'funnel-outline'"></nb-icon>
        </button>
      </div>
    </div>

    <!-- Painel de Filtros Simplificado -->
    <div class="modal fade" id="filtrosModal" tabindex="-1" aria-labelledby="filtrosModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-body">
            <form class="w-100">
              <div class="form-header w-100 d-flex justify-content-end">
                <button class="btn p-0 close-filter-button" data-bs-dismiss="modal" #modalCloseButton
                  (click)="closeFilterModal()">
                  <nb-icon [icon]="'close-outline'"></nb-icon>
                </button>
              </div>

              <div class="d-flex flex-column w-100">
                <div class="filter-row d-flex flex-column flex-md-row flex-wrap w-100">

                  <!-- Ano -->
                  <div class="filter-entity d-flex flex-column col-12 col-md-6 col-xl-4">
                    <span class="mb-1">Ano</span>
                    <nb-select name="ano" placeholder="Selecionar" size="tiny" [(ngModel)]="filter.ano"
                      (selectedChange)="handleFilterChange('ano', [$event])" #customSelect>
                      <nb-option *ngFor="let ano of yearsList" [value]="ano.num">
                        {{ ano.num }}
                      </nb-option>
                    </nb-select>
                  </div>

                  <!-- Mês -->
                  <div class="filter-entity d-flex flex-column col-12 col-md-6 col-xl-4">
                    <span class="mb-1">Mês</span>
                    <nb-select multiple name="mes" placeholder="Selecionar" size="tiny" [(ngModel)]="filter.mes"
                      (selectedChange)="handleFilterChange('mes', $event)" #customSelect>
                      <nb-option *ngFor="let mes of monthsList" [value]="mes.num">
                        {{ mes.name }}
                      </nb-option>
                    </nb-select>
                  </div>

                  <!-- Tipo de Fonte -->
                  <div class="filter-entity d-flex flex-column col-12 col-md-6 col-xl-4">
                    <span class="mb-1">Tipo de Fonte</span>
                    <nb-select multiple name="tipoFonte" placeholder="Selecionar" size="tiny"
                      [(ngModel)]="filter.tipoFonte" (selectedChange)="handleFilterChange('tipoFonte', $event)"
                      #customSelect>
                      <nb-option [value]="1">Caixas Tesouros</nb-option>
                      <nb-option [value]="2">Demais Fontes</nb-option>
                    </nb-select>
                  </div>

                </div>
              </div>
            </form>
          </div>

          <div class="modal-footer d-flex flex-column flex-sm-row justify-content-center justify-content-sm-end">
            <button class="mx-4" nbButton size="small" status="warning" outline shape="semi-round"
              (click)="resetFilters()">Restaurar Filtros</button>
            <button nbButton size="small" status="success" hero shape="semi-round" data-bs-dismiss="modal"
              (click)="filtrar($event)">Filtrar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-2 mb-0">
    <!-- Card Logo -->
    <div class="col-xs-12 col-sm-6 col-md-6 col-lg-4 col-xxl-2 mb-2">
      <nb-card class="card-logo h-100 mb-0">
        <nb-card-body class="logo-card p-2">
          <div class="logo-wrapper d-flex align-items-start justify-content-start">
            <img src="assets/images/app/logo-exec-orc-claro.png" alt="Logo Execução Orçamentária" class="img-fluid" />
          </div>
        </nb-card-body>
      </nb-card>
    </div>

    <!-- Cards Dinâmicos -->
    <ng-container *ngFor="let item of sendCards; trackBy: trackByFn">
      <div class="col-xs-12 col-sm-6 col-md-6 col-lg-4 col-xxl-2 mb-2">
        <nb-card class="card-info h-100 mb-0">
          <nb-card-body class="p-2">
            <ngx-cards-component [value]="item.value" [description]="item.description" [cor]="item.cor"
              [icone]="item.icone" [prefixo]="item.prefixo" [data]="dataReceitaCards($event)"
              [tooltip]="item.tooltip" />
          </nb-card-body>
        </nb-card>
      </div>
    </ng-container>
  </div>
  <div class="row g-2 g-md-3 p-0">
    <!-- Receita Total - Destaque maior em telas grandes -->
    <div class="col-12 col-md-12 col-lg-6 col-xl-6 col-xxl-6 col-xxxl-4">
      <ngx-receita-total (dataReceitaTotalCards)="dataCards" [filter]="currentRequestParams"></ngx-receita-total>
    </div>

    <!-- Receita Categoria -->
    <div class="col-12 col-md-12 col-lg-6 col-xl-6 col-xxl-6 col-xxxl-4">
      <ngx-receita-categoria [filter]="currentRequestParams"></ngx-receita-categoria>
    </div>

    <!-- Receita Origem -->
    <div class="col-12 col-md-12 col-lg-6 col-xl-6 col-xxl-6 col-xxxl-4">
      <ngx-receita-origem [filter]="currentRequestParams"></ngx-receita-origem>
    </div>

    <!-- Receita Impostos -->
    <div class="col-12 col-md-12 col-lg-6 col-xl-6 col-xxl-6 col-xxxl-4">
      <ngx-receita-impostos [filter]="currentRequestParams"></ngx-receita-impostos>
    </div>

    <!-- Receita Participação -->
    <div class="col-12 col-md-12 col-lg-12 col-xl-6 col-xxl-6 col-xxxl-4">
      <ngx-receita-participacao [filter]="currentRequestParams"></ngx-receita-participacao>
    </div>

    <!-- Receita ICMS -->
    <div class="col-12 col-md-12 col-lg-12 col-xl-6 col-xxl-6 col-xxxl-4">
      <ngx-receita-icms [filter]="currentRequestParams"></ngx-receita-icms>
    </div>

    <!-- Receita Transferência -->
    <div class="col-12 col-md-12 col-lg-6 col-xl-6 col-xxl-6 col-xxxl-6">
      <ngx-receita-transferencia [filter]="currentRequestParams"></ngx-receita-transferencia>
    </div>

    <!-- Receita Despesa GND Total -->
    <div class="col-12 col-md-12 col-lg-6 col-xl-6 col-xxl-6 col-xxxl-6">
      <ngx-receita-despesa-gnd-total (receitaDespesaGNDTotalOrcamento)="dataCards"
        [filter]="currentRequestParams"></ngx-receita-despesa-gnd-total>
    </div>

    <!-- Receita Despesa GND -->
    <div class="col-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
      <ngx-receita-despesa-gnd [filter]="currentRequestParams"></ngx-receita-despesa-gnd>
    </div>
  </div>
  <div class="d-flex flex-wrap col-12 col-xxl-6 p-0">
    <div class="col-12 col-md-6 px-x1 mb-1 align-self-start"></div>
  </div>
</div>
