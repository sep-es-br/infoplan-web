<ngx-flip-table
  [showSearchField]="true"
  [cardTitle]="title"
  [loadingStatus]="requestStatus"
  [tableContent]="tableContent"
  (executeDownload)="handleTableDownload()"
  (executeSearch)="handleTableSearch($event)"
  [backCardHeight]="isChartMaximized('progress-bar-po') ? calcMaximizedHeight() : 500"
  [showMaximizeButton]="true"
  [tableOnFront]="false"
  (showMaximizeButtonClick)="onMaximizeButtonClick('progress-bar-po',$event)">
  <ngx-chart-progress-bar
    [chart]="chartData"
    [chartDataConfig]="chartDataConfig"
    [height]="isChartMaximized('progress-bar-po') ? calcMaximizedHeight() : 500"
    [showMaximizeButton]="isChartMaximized('progress-bar-po')"
    card-front>
  </ngx-chart-progress-bar>
</ngx-flip-table>
