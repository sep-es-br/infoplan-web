<nb-card class="card-dinamico h-100" [class]="'card-' + cor">

    <div class="card-content w-100">
      <div class="card-value">
        {{ value }}

      <div class="card-description">
        {{ description }}
      </div>
    </div>
  </nb-card-body>
</nb-card>
