<!-- receita-total.component.html -->
<ngx-flip-table
  [cardTitle]="title"
  [tableContent]="tableContent"
  [loadingStatus]="loadingStatus"
  (executeSearch)="handleTableSearch($event)"
  (executeDownload)="handleTableDownload()"
>
  <ngx-org-chart-vertical
    [chart]="this.chartData"
    [height]="300"
    [width]="400"
    card-front
  ></ngx-org-chart-vertical>
</ngx-flip-table>
