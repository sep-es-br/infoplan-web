<div class="container">
  <div class="align-content-start">
    <div class="row justify-content-start card-outer-format">
      <ng-container
        *ngFor="let secao of secoes"
        >
        <div
          class="divisor"
        >
          {{ secao.label }}
        </div>

        <ng-container *ngFor="let menuItem of groupedMenu[secao.id]">
          <div class="col-12 col-md-6 col-xxl-4 mt-2">
            <nb-card
              class="d-flex flex-column p-4 rounded"
              [ngClass]="{ 'card-external': menuItem.isExternal }"
              (click)="handleClick(menuItem.id)"
            >
              <div class="d-flex justify-content-end w-100 icon-box">
                <nb-icon
                  *ngIf="menuItem.url"
                  icon="external-link-outline"
                  class="icon-external"
                >
                </nb-icon>
              </div>
              <div class="d-flex flex-column flex-md-row">
                <nb-card-header
                  class="d-flex align-items-start justify-content-start col-12 col-md-2 p-0 mb-2 mb-md-0 header"
                >
                  <div class="img-box">
                    <img
                      class="img-box p-2 rounded"
                      [ngStyle]="{
                        'background-color': menuItem.status
                          ? menuItem.color
                          : 'red',
                      }"
                      [src]="'assets/images/app/' + menuItem.icon"
                      [alt]="menuItem.name + ' Icon'"
                    />
                  </div>
                </nb-card-header>
                <div class="d-flex flex-column col-12 col-md-10">
                  <nb-card-body
                    class="body d-flex flex-column align-items-start align-items-md-start p-0 pe-4 ps-md-3"
                  >
                    <div
                      class="title d-flex w-100 justify-content-start justify-content-md-start"
                    >
                      <span class="title">{{ menuItem.name }}</span>
                    </div>
                    <div
                      class="subtitle d-flex w-100 justify-content-start justify-content-md-start"
                    >
                      <span *ngIf="menuItem.subTitle" class="subtitle">
                        {{ menuItem.subTitle }}
                      </span>
                    </div>
                  </nb-card-body>
                  <nb-card-footer class="footer p-0 text-end">
                    <span class="italic">Fonte: {{ menuItem.src }}</span>
                  </nb-card-footer>
                </div>
              </div>
            </nb-card>
          </div>
        </ng-container>
      </ng-container>
    </div>
  </div>
</div>
