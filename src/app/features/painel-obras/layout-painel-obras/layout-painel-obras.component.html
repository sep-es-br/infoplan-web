<div class="col-12">
  <div class="filter-container">
    <div class="filter-wrapper" [class.is-sticky]="isScrolled">
      <div class="filter-button multi-row-navigation px-2" [class.is-sticky]="isScrolled">
        <div class="nav-buttons-container flex-grow-1">
          <ngx-sticky-tag-nav [tags]="menuPortalObras"></ngx-sticky-tag-nav>
        </div>

        <div class="d-flex align-items-center gap-2 flex-grow-1">
          <div class="filter-tags ms-auto" [class.is-sticky]="isScrolled">
            <div *ngFor="let tag of activeFilters; let i = index">
              <div class="filter-tag" [class.is-sticky]="isScrolled">
                <div class="filter-tag-inner" [ngClass]="{ 'invisible-tag': showFilters }">
                  <div>
                    <div class="tag-label">{{ tag.label }}</div>
                    <div class="tag-value">
                      <ng-container *ngFor="let valueDisplay of tag.displayValue; let index = index">
                        <ng-container *ngIf="valueDisplay.name?.length <= 20; else spanWithTooltip">
                          <span>
                            {{ (index > 0 ? " " : "") + (tag.displayValue.length > 1 ? valueDisplay.name + ";" : valueDisplay.name) }}
                          </span>
                        </ng-container>

                        <ng-template #spanWithTooltip>
                          <span [nbTooltip]="valueDisplay.fullName ? valueDisplay.fullName : valueDisplay.name">
                            {{ (index > 0 ? " " : "") + (valueDisplay.name | TextTruncate: 17 : ";") }}
                          </span>
                        </ng-template>
                      </ng-container>
                    </div>
                  </div>
                </div>
                <button
                  *ngIf="tag.key !== 'portfolio' && tag.key !== 'dataInicio' && tag.key !== 'dataFim'"
                  class="remove-button"
                  (click)="removeFilter(tag.key)">
                  x
                </button>
              </div>
            </div>
          </div>

          <button
            class="filter-toggle-icon-only"
            [class.is-sticky]="isScrolled"
            type="button"
            data-bs-toggle="modal"
            data-bs-target="#filtrosModal"
            (click)="blurButton($event, filtrosTooltip)"
            nbTooltip="Filtros"
            #filtrosTooltip="nbTooltip">
            <nb-icon [icon]="'funnel-outline'"></nb-icon>
          </button>
        </div>
      </div>
    </div>

    <div class="modal fade dashboard-filter-modal" id="filtrosModal" tabindex="-1" aria-labelledby="filtrosModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-body">
            <form class="w-100">
              <div class="form-header w-100 d-flex justify-content-end">
                <button type="button" class="btn p-0 close-filter-button" data-bs-dismiss="modal" #modalCloseButton (click)="closeFilterModal()">
                  <nb-icon [icon]="'close-outline'"></nb-icon>
                </button>
              </div>
              <div class="d-flex flex-column w-100">
                <!-- Substituído flex-column flex-md-row por uma estrutura 'row' limpa -->
                <div class="filter-row d-flex flex-column flex-md-row flex-wrap w-100">
                  <div class="filter-entity d-flex flex-column col-12 col-md-6 col-xl-4">
                    <span class="mb-1">Órgão</span>
                    <nb-select name="orgao" placeholder="Selecionar" size="tiny" [(selected)]="filter.orgao" (selectedChange)="handleFilterChange('orgao', $event)" #customSelect>
                      <nb-option *ngFor="let orgao of orgaosList" [value]="orgao.orgaoId">
                        {{ orgao.nome }}
                      </nb-option>
                    </nb-select>
                  </div>

                  <div class="filter-entity d-flex flex-column col-12 col-md-6 col-xl-4">
                    <span class="mb-1">Município</span>
                    <nb-select name="municipio" placeholder="Selecionar" size="tiny" [(selected)]="filter.municipio" (selectedChange)="handleFilterChange('municipio', $event)" #customSelect>
                      <nb-option *ngFor="let municipio of municipiosList" [value]="municipio.id">
                        {{ municipio.nome }}
                      </nb-option>
                    </nb-select>
                  </div>

                  <div class="filter-entity d-flex flex-column col-12 col-md-6 col-xl-4">
                    <span class="mb-1">Status</span>
                    <nb-select name="status" placeholder="Selecionar" size="tiny" [(selected)]="filter.status" (selectedChange)="handleFilterChange('status', $event)" #customSelect>
                      <nb-option *ngFor="let status of statusList" [value]="status.id">
                        {{ status.fase }}
                      </nb-option>
                    </nb-select>
                  </div>
                </div>
              </div>
            </form>
          </div>

          <div class="modal-footer d-flex flex-column flex-sm-row justify-content-center justify-content-sm-end">
            <button class="mx-4 mb-2 mb-sm-0" nbButton size="small" status="warning" outline shape="semi-round" (click)="resetFilters()">
              Restaurar Filtros
            </button>
            <button nbButton size="small" status="success" hero shape="semi-round" data-bs-dismiss="modal" (click)="filtrar($event)">
              Filtrar
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-1 px-2 totalizers-grid">
      <div class="col-12 col-xl-2 px-1 summary-logo-column">
        <div class="card">
          <div class="card-content h-100">
            <div class="portfolio-content w-100 h-100 d-flex justify-content-start align-items-center">
              <img [src]="logoPaneilObrasUrl" alt="Portal de Obras do Governo do Estado do Espírito Santo" class="img-fluid" />
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-xl-10 px-1 summary-cards-column">
        <div class="row g-1 summary-cards-grid">

          <div class="col-12 col-sm-6 col-xl-4 px-1 summary-card-column">
            <ngx-dashboard-summary-card
              [value]="statusTotal.totalizadorProgramas"
              label="Programas"
              icon="fas fa-cogs"
              accentColor="#137bb9"
              [tooltip]="statusTotal.totalizadorProgramas"
              [loading]="requestStatus.status === 'Loading'"
            ></ngx-dashboard-summary-card>
          </div>

          <div class="col-12 col-sm-6 col-xl-4 px-1 summary-card-column">
            <ngx-dashboard-summary-card
              [value]="statusTotal.totalizadorProjetos"
              label="Projetos"
              icon="fas fa-cog"
              accentColor="#d0647d"
              [tooltip]="statusTotal.totalizadorProjetos"
              [loading]="requestStatus.status === 'Loading'"
            ></ngx-dashboard-summary-card>
          </div>

          <div class="col-12 col-sm-6 col-xl-4 px-1 summary-card-column">
            <ngx-dashboard-summary-card
              [value]="statusTotal.contagemEntregas"
              label="Entregas"
              icon="fas fa-cubes"
              accentColor="#d3913c"
              [tooltip]="statusTotal.contagemEntregas + ' Entregas'"
              [loading]="requestStatus.status === 'Loading'"
            ></ngx-dashboard-summary-card>
          </div>

          <div class="col-12 col-sm-6 col-xl-4 px-1 summary-card-column">
            <ngx-dashboard-summary-card
              [value]="formatNumber(statusTotal.monitoramentoPlanejado)"
              label="Financeiro Planejado"
              icon="fas fa-calculator"
              accentColor="#62a581"
              [tooltip]="'R$ ' + (statusTotal.monitoramentoPlanejado | number: '1.0-0')"
              [loading]="requestStatus.status === 'Loading'"
            ></ngx-dashboard-summary-card>
          </div>

          <div class="col-12 col-sm-6 col-xl-4 px-1 summary-card-column">
            <ngx-dashboard-summary-card
              [value]="formatNumber(statusTotal.monitoramentoRealizado)"
              label="Financeiro Realizado"
              icon="fas fa-database"
              accentColor="#8d7fa2"
              [tooltip]="'R$ ' + (statusTotal.monitoramentoRealizado | number: '1.0-0')"
              [loading]="requestStatus.status === 'Loading'"
            ></ngx-dashboard-summary-card>
          </div>

          <div class="col-12 col-sm-6 col-xl-4 px-1 summary-card-column">
            <ngx-dashboard-summary-card
              [value]="statusTotal.totalEntregasPE"
              label="Filtro Temporal Crítico"
              icon="fas fa-hourglass-half"
              accentColor="#43a4a6"
              [tooltip]="statusTotal.totalEntregasPE + ' EntregasPE'"
              [loading]="requestStatus.status === 'Loading'"
            ></ngx-dashboard-summary-card>
          </div>

        </div>
      </div>
    </div>
  </div>

  <ng-container>
    <router-outlet></router-outlet>
  </ng-container>
</div>
