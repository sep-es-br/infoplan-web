<ngx-flip-table
  [cardTitle]="title"
  [loadingStatus]="loadingStatus"
  [tableContent]="tableContent"
  (executeSearch)="handleTableSearch"
  (executeDownload)="handleTableDownload()"
>
<ngx-org-chart-horizontal
  [chart]="chartData"
  [height]="300"
  [width]="400"
  card-front
>
</ngx-org-chart-horizontal>
</ngx-flip-table>
