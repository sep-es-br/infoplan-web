  <div class="col-12 col-xxxl-12">
    <nb-card class="cards-exec">
      <nb-card-body>
        <div
          class="row flex-wrap g-2 g-md-3 align-items-center justify-content-between"
        >
          <!-- Logo -->
          <div class="col-6 col-sm-4 col-md-4 col-lg-2 mb-2 px-1">
            <div class="execucao-orcamentaria-content">
              <img
                src="assets/images/app/logo-exec-orc-claro.png"
                alt="Logo"
                class="execucao-orcamentaria-logo img-fluid w-100"
              />
            </div>
          </div>

          <!-- Cards -->
          <div
            *ngFor="let card of cards"
            class="col-6 col-sm-4 col-md-6 col-lg-6 col-xl-6 col-xxl-2 col-xxxl-2"
          >
            <ngx-cards-component
              [value]="card.value"
              [description]="card.description"
              [cor]="card.cor"
              [icone]="card.icone"
              class="w-100 h-100"
            >
            </ngx-cards-component>
          </div>
        </div>
      </nb-card-body>
    </nb-card>
  </div>
  <div class="row g-2 g-md-3 p-0">
    <!-- Receita Total - Destaque maior em telas grandes -->
    <div class="col-12 col-md-12 col-lg-6 col-xl-6 col-xxl-6 col-xxxl-4">
      <ngx-receita-total [filter]="currentRequestParams"></ngx-receita-total>
    </div>

    <!-- Receita Categoria -->
    <div class="col-12 col-md-12 col-lg-6 col-xl-6 col-xxl-6  col-xxxl-4">
      <ngx-receita-categoria
        [filter]="currentRequestParams"
      ></ngx-receita-categoria>
    </div>

    <!-- Receita Origem -->
    <div class="col-12 col-md-12 col-lg-6 col-xl-6 col-xxl-6 col-xxxl-4">
      <ngx-receita-origem [filter]="currentRequestParams"></ngx-receita-origem>
    </div>

    <!-- Receita Impostos -->
    <div class="col-12 col-md-12 col-lg-6 col-xl-6 col-xxl-6 col-xxxl-4">
      <ngx-receita-impostos
        [filter]="currentRequestParams"
      ></ngx-receita-impostos>
    </div>

    <!-- Receita Participação -->
    <div class="col-12 col-md-12 col-lg-12 col-xl-6 col-xxl-6 col-xxxl-4">
      <ngx-receita-participacao
        [filter]="currentRequestParams"
      ></ngx-receita-participacao>
    </div>

    <!-- Receita ICMS -->
    <div class="col-12 col-md-12 col-lg-12 col-xl-6 col-xxl-6 col-xxxl-4">
      <ngx-receita-icms [filter]="currentRequestParams"></ngx-receita-icms>
    </div>

    <!-- Receita Transferência -->
    <div class="col-12 col-md-12 col-lg-6 col-xl-6 col-xxl-6 col-xxxl-6">
      <ngx-receita-transferencia
        [filter]="currentRequestParams"
      ></ngx-receita-transferencia>
    </div>

    <!-- Receita Despesa GND Total -->
    <div class="col-12 col-md-12 col-lg-6 col-xl-6 col-xxl-6 col-xxxl-6">
      <ngx-receita-despesa-gnd-total
        [filter]="currentRequestParams"
      ></ngx-receita-despesa-gnd-total>
    </div>

    <!-- Receita Despesa GND -->
    <div class="col-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
      <ngx-receita-despesa-gnd
        [filter]="currentRequestParams"
      ></ngx-receita-despesa-gnd>
    </div>
  </div>
  <div class="d-flex flex-wrap col-12 col-xxl-6 p-0">
    <div class="col-12 col-md-6 px-x1 mb-1 align-self-start"></div>
  </div>
</div>
