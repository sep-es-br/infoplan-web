<ngx-flip-table
  [cardTitle]="'Entregas por Desempenho'"
  [tableContent]="flipTableContent"
  [showMaximizeButton]="true"
  [loadingStatus]="requestStatus"
  [outerCardHeight]="275"
  [backCardHeight]="isChartMaximized('deliveries-by-performace') ? 700 : 150"
  (executeSearch)="handleUserTableSearch($event)"
  (executeDownload)="handleUserTableDownload()"
  (showMaximizeButtonClick)="onMaximizeButtonClick('deliveries-by-performace', $event)">
  <ngx-pie-chart-model
    [data]="chartData"
    [colors]="chartColors"
    [height]="isChartMaximized('deliveries-by-performace') ? 180 : 150"
    [height]="isChartMaximized('deliveries-by-performace') ?   400 : 150"
    [fontSizeLegend]="isChartMaximized('deliveries-by-performace') ? 20 : 9"
    [isMaximized]="isChartMaximized('deliveries-by-performace')"
    card-front>
  </ngx-pie-chart-model>
</ngx-flip-table>
