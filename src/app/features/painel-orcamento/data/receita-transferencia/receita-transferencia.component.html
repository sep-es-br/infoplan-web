<ngx-flip-table [cardTitle]="title" [showSearchField]="true" [tableContent]="tableContent"
  [loadingStatus]="loadingStatus" (executeSearch)="handleTableSearch($event)" (executeDownload)="handleTableDownload()"
  (showMaximizeButtonClick)="onMaximizeButtonClick('receita-transferencia',$event)">
  <ngx-org-chart-horizontal [chart]="chartData"
    [height]="isChartMaximized('receita-transferencia') ? calcMaximizedHeight() : 300"
    card-front></ngx-org-chart-horizontal>
</ngx-flip-table>
