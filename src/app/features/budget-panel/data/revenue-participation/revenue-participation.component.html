<ngx-flip-table [cardTitle]="title" [loadingStatus]="requestStatus" [tableContent]="tableContent" backCardHeight="308"
  [showTableIcon]="showTableIcon" [showSearchField]="false" (executeDownload)="handleTableDownload()"
  [showMaximizeButton]="true" (showMaximizeButtonClick)="onMaximizeButtonClick('revenue-participation', $event)">
  <ngx-pie-chart [data]="chartData" [colors]="['#F58B9B', '#4DB6D2']"
    [height]="isChartMaximized('revenue-participation') ? calcMaximizedHeight() : '300'"
    [config]="chartConfig"
    [showMaximizeButton]="isChartMaximized('revenue-participation')"
    card-front>
  </ngx-pie-chart>
</ngx-flip-table>
