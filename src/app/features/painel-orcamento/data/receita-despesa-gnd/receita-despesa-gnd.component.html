<ngx-flip-table [cardTitle]="title" [tableContent]="tableContent" [showSearchField]="true"
  (executeDownload)="handleTableDownload()" [loadingStatus]="loadingStatus"
  (showMaximizeButtonClick)="onMaximizeButtonClick('receita-despesa-gnd', $event)">
  <ngx-org-chart-vertical [chart]="chartData"
    [height]="isChartMaximized('receita-despesa-gnd') ? calcMaximizedHeight() : 300"
    card-front></ngx-org-chart-vertical>
</ngx-flip-table>
